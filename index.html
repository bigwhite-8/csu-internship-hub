<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSU资安院 | 实习互助全景平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hover-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .img-preview { max-height: 200px; object-fit: cover; border-radius: 0.5rem; border: 1px solid #e2e8f0; }
        .pdf-preview-container { width: 100%; height: 400px; border-radius: 0.5rem; overflow: hidden; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, increment, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        window.FB = { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, increment, deleteDoc, arrayUnion };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 知识库数据 ---
        const ENCYCLOPEDIA = [
            {
                id: 'majors',
                title: '三大专业全景解析',
                icon: '🎓',
                isSpecial: true,
                content: [
                    { title: "🛡️ 安全工程 (Safety Engineering)", tags: ["EHS管理", "ISO体系", "风险评估"], desc: "不仅仅是排查隐患，更是构建企业防御体系。女生极具优势，沟通力强、细心负责。", points: "掌握ISO14001/45001体系运作，熟悉环评职评。避开传统高危行业，优先新能源、汽车制造、电子半导体等。" },
                    { title: "⛏️ 采矿工程 (Mining Engineering)", tags: ["智能矿山", "三维建模", "自动化调度"], desc: "传统采矿正向机械化、智能化迈进。熟练掌握CAD及Dimine等软件是核心。", points: "深入了解凿岩、爆破、通风等工艺流程。优先考虑大型国企或国际化矿业公司。可向微震监测等前沿技术深造。" },
                    { title: "🚇 城市地下空间工程 (Underground Space Eng.)", tags: ["盾构施工", "BIM技术", "基坑监测"], desc: "随着城市化进程，地铁、地下管廊蓬勃发展。高度依托大型工程项目现场。", points: "实地观察盾构法、明挖基坑施工。BIM技术在地下管线综合中不可或缺。积累现场经验后向技术负责人转型。" }
                ]
            },
            {
                id: 'pitfalls',
                title: '实习与投递避雷指南',
                icon: '🚨',
                sections: [
                    { h: '五大致命雷区', list: [
                        '❌ 行业方向不明确，盲目海投：石化重HAZOP工艺安全，建筑重脚手架高空作业。',
                        '❌ 简历堆砌课程，忽视实操：企业宁要查过宿舍消防的，也不要只会背书的。要把课程设计包装成项目。',
                        '❌ 没提前准备行业知识：面试前必须搜行业典型事故案例，准备特有解决方案。',
                        '❌ 忽略安全岗特殊要求：必学三大法宝：法规(安法第25条)、预案编制流程、风险评估方法(LEC/HAZOP)。',
                        '❌ 死等网申，不敢争取内推：坑位少，盯紧校企合作、政府暑期计划及行业社群。'
                    ]}
                ]
            },
            {
                id: 'interview',
                title: '简历与面试通关秘籍',
                icon: '💬',
                sections: [
                    { h: '简历高分写法 (STAR法则)', list: [
                        '情境+任务+行动+结果。例：“负责储罐区HAZOP分析，发现2处静电隐患并建议增设联锁装置，减少整改成本5W+”。',
                        '加入数据加分：例如“巡检记录让部门隐患整改率从60%提升至85%”。',
                        '突出工具技能：AutoCAD画疏散图、气体检测仪使用、Python数据分析。'
                    ]}
                ]
            },
            {
                id: 'career',
                title: '八大就业方向全景图',
                icon: '🧭',
                sections: [
                    { h: '核心就业方向', list: [
                        '🏭 工厂制造业：安全工程师、EHS工程师（建体系）。',
                        '🏗️ 建筑与施工：施工安全员、安全监理、BIM安全工程师。',
                        '⛰️ 矿业及地下工程：矿山安全工程师、爆破安全工程师。',
                        '🔋 新能源（风口）：锂电池防火防爆设计、储能安全评估。'
                    ]}
                ]
            },
            {
                id: 'girls',
                title: '女生专属就业指南',
                icon: '👩‍🎓',
                sections: [
                    { h: '避开偏见，精准拿Offer', list: [
                        '🌟 企业EHS管理（主场）：外企/大厂/新能源超爱招！主攻体系专员、职业健康管理师。',
                        '📊 安全咨询/服务（脑力派）：逻辑清晰文笔好，做安全评价师、EHS咨询顾问。',
                        '💻 新兴蓝海赛道：智慧安全工程师、ESG专员、互联网安全培训师。'
                    ]}
                ]
            }
        ];

        const App = () => {
            const [view, setView] = useState('guide'); 
            const [activeArticle, setActiveArticle] = useState('majors'); 
            const [posts, setPosts] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // 附件状态管理 (分离图片和PDF)
            const [uploadedImg, setUploadedImg] = useState(null);
            const [uploadedPdf, setUploadedPdf] = useState(null);

            // 评论及权限管理
            const [activeCommentPostId, setActiveCommentPostId] = useState(null);
            const [commentText, setCommentText] = useState('');
            const [commentAuthor, setCommentAuthor] = useState('');
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [appId, setAppId] = useState('csu-hub-real');

            useEffect(() => {
                if (!window.FB) return;
                try {
                    // 🌟 你的专属数据库钥匙已经在这里替换好了！ 🌟
                    const fbConfig = {
                        apiKey: "AIzaSyDtXgBL8ZbvVe7cxgj4p0DPM4qSximov4M",
                        authDomain: "csu-internship-hub.firebaseapp.com",
                        projectId: "csu-internship-hub",
                        storageBucket: "csu-internship-hub.firebasestorage.app",
                        messagingSenderId: "465448064487",
                        appId: "1:465448064487:web:27ad23424f1e8cbc169942"
                    };
                    const id = 'csu-internship-hub-real';
                    setAppId(id);

                    const app = window.FB.initializeApp(fbConfig);
                    const auth = window.FB.getAuth(app);
                    const firestoreDb = window.FB.getFirestore(app);
                    setDb(firestoreDb);

                    const initAuth = async () => {
                        try {
                            await window.FB.signInAnonymously(auth);
                        } catch (error) {
                            console.error("匿名登录失败，请确保在Firebase开启了Anonymous认证", error);
                        }
                    };
                    initAuth();

                    window.FB.onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if(u) loadCloudPosts(firestoreDb, id);
                    });
                } catch(e) { console.log("Firebase 初始化失败: ", e); }
            }, []);

            const loadCloudPosts = (database, currentAppId) => {
                const postsCol = window.FB.collection(database, 'artifacts', currentAppId, 'public', 'data', 'posts');
                window.FB.onSnapshot(postsCol, (snapshot) => {
                    const fetchedPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPosts(fetchedPosts.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error(err));
            };

            const handleAdminLogin = () => {
                const pwd = prompt("🕵️ 管理员验证，请输入密码：");
                if (pwd === "csu888") { setIsAdmin(true); alert("✅ 管理员模式已开启！"); } 
                else if (pwd !== null) { alert("❌ 密码错误"); }
            };

            // 🌟 统一附件上传处理逻辑 🌟
            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;

                if (type === 'image') {
                    if(file.size > 5 * 1024 * 1024) return alert('图片不能超过5MB哦！');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            let width = img.width, height = img.height;
                            if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            setUploadedImg(canvas.toDataURL('image/jpeg', 0.6));
                            setUploadedPdf(null); // 上传图片则清空PDF
                        }
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else if (type === 'pdf') {
                    if(file.size > 800 * 1024) { 
                        return alert('由于数据库云端限制，PDF附件大小请严格控制在 800KB 以内！\n\n💡 建议：使用WPS或在线工具压缩PDF后再上传。'); 
                    }
                    if(file.type !== 'application/pdf') {
                        return alert('仅支持 .pdf 格式文件！');
                    }
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setUploadedPdf({
                            name: file.name,
                            data: event.target.result
                        });
                        setUploadedImg(null); 
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePost = async (e) => {
                e.preventDefault();
                if(!db || !user) { alert("网络连接中，请稍后再试"); return; }
                const formData = new FormData(e.target);
                
                try {
                    await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                        title: formData.get('title'),
                        major: formData.get('major'),
                        author: formData.get('author') || '匿名同学',
                        content: formData.get('content'),
                        image: uploadedImg, 
                        pdf: uploadedPdf,   
                        likes: 0,
                        userId: user.uid,
                        comments: [],
                        createdAt: window.FB.serverTimestamp()
                    });
                    setIsModalOpen(false);
                    setUploadedImg(null);
                    setUploadedPdf(null);
                } catch (error) { console.error("发帖失败", error); alert("发帖失败，可能是附件超过限制大小"); }
            };

            const handleLike = async (id) => {
                if(!db) return;
                const postRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
                await window.FB.updateDoc(postRef, { likes: window.FB.increment(1) });
            };

            const submitComment = async (postId) => {
                if(!db || !user || !commentText.trim()) return;
                try {
                    const postRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId);
                    await window.FB.updateDoc(postRef, {
                        comments: window.FB.arrayUnion({
                            id: Date.now().toString(),
                            author: commentAuthor || '热心同学',
                            text: commentText,
                            userId: user.uid,
                            createdAt: new Date().getTime()
                        })
                    });
                    setCommentText('');
                    setActiveCommentPostId(null);
                } catch(e) { console.error("评论失败", e); }
            };

            const handleDelete = async (id) => {
                if(!db) return;
                if (confirm("⚠️ 确定要永久删除这条帖子吗？")) {
                    try { await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'posts', id)); } 
                    catch(e) { console.error("删除失败", e); }
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass-nav sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onDoubleClick={handleAdminLogin} title="双击进入管理模式">
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-md ${isAdmin ? 'bg-red-600' : 'bg-gradient-to-r from-blue-600 to-indigo-600'}`}>
                                    {isAdmin ? '管' : '安'}
                                </div>
                                <h1 className="text-lg font-bold tracking-wide text-slate-800">资安实习全景平台</h1>
                            </div>
                            <nav className="flex gap-2 sm:gap-6">
                                <button onClick={() => setView('guide')} className={`text-sm font-semibold h-16 px-2 ${view === 'guide' ? 'tab-active' : 'text-slate-500 hover:text-blue-600'}`}>百科指南</button>
                                <button onClick={() => setView('community')} className={`text-sm font-semibold h-16 px-2 ${view === 'community' ? 'tab-active' : 'text-slate-500 hover:text-blue-600'}`}>社区广场</button>
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
                        {view === 'guide' ? (
                            <div className="fade-in grid md:grid-cols-4 gap-8">
                                <div className="md:col-span-1 space-y-2">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest px-4 mb-4">核心知识库</h3>
                                    {ENCYCLOPEDIA.map(item => (
                                        <button key={item.id} onClick={() => setActiveArticle(item.id)} className={`w-full text-left px-4 py-3 rounded-xl transition-all flex items-center gap-3 ${activeArticle === item.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}>
                                            <span className="text-lg">{item.icon}</span> <span className="font-semibold text-sm">{item.title}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="md:col-span-3">
                                    {ENCYCLOPEDIA.filter(item => item.id === activeArticle).map(article => (
                                        <div key={article.id} className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 fade-in min-h-[500px]">
                                            <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b pb-6"><span>{article.icon}</span> {article.title}</h2>
                                            {article.isSpecial ? (
                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                    {article.content.map((major, i) => (
                                                        <div key={i} className="bg-slate-50 rounded-2xl p-6 border border-slate-100 hover:shadow-md transition-shadow">
                                                            <h3 className="font-bold text-lg text-slate-800 mb-2">{major.title}</h3>
                                                            <div className="flex flex-wrap gap-1 mb-4">
                                                                {major.tags.map(t => <span key={t} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded">{t}</span>)}
                                                            </div>
                                                            <p className="text-sm text-slate-600 mb-4">{major.desc}</p>
                                                            <div className="bg-white p-4 rounded-xl text-xs text-slate-500 border border-slate-200 shadow-sm">
                                                                <strong>核心指引：</strong>{major.points}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="space-y-10">
                                                    {article.sections.map((sec, idx) => (
                                                        <div key={idx}>
                                                            <h3 className="text-xl font-bold text-blue-700 mb-4 border-l-4 border-blue-600 pl-3">{sec.h}</h3>
                                                            <ul className="space-y-4 text-slate-600">
                                                                {sec.list.map((li, i) => (
                                                                    <li key={i} className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><span className="leading-relaxed">{li}</span></li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="fade-in max-w-3xl mx-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <div>
                                        <h2 className="text-2xl font-extrabold text-slate-800">互助广场 {isAdmin && <span className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded ml-2">管理员</span>}</h2>
                                        <p className="text-sm text-slate-500 mt-1">打破专业信息差，支持附件分享</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-blue-200 transition-transform transform hover:-translate-y-1">
                                        📸 发布干货帖子
                                    </button>
                                </div>
                                
                                <div className="space-y-6">
                                    {posts.length === 0 ? <div className="text-center py-20 text-slate-400">正在同步云端数据，或暂无帖子...</div> : 
                                    posts.map(post => {
                                        const canDelete = isAdmin || (user && post.userId === user.uid);

                                        return (
                                            <div key={post.id} className="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 hover-card relative">
                                                {canDelete && (
                                                    <button onClick={() => handleDelete(post.id)} className="absolute top-6 right-6 text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 px-3 py-1 rounded-lg text-sm font-bold transition">
                                                        🗑️ 删帖
                                                    </button>
                                                )}
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 font-bold text-lg">{post.author?.charAt(0) || '匿'}</div>
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-slate-800">{post.author}</span>
                                                            <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold">{post.major === 'safety' ? '安全工程' : post.major === 'mining' ? '采矿工程' : '城市地下空间工程'}</span>
                                                        </div>
                                                        <span className="text-xs text-slate-400">{post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : '刚刚'}</span>
                                                    </div>
                                                </div>
                                                <h4 className="font-bold text-lg text-slate-900 mb-3">{post.title}</h4>
                                                <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap mb-4">{post.content}</p>
                                                
                                                {/* 🌟 图片渲染 🌟 */}
                                                {post.image && (
                                                    <div className="mb-4 rounded-xl overflow-hidden border border-slate-100 max-w-lg">
                                                        <img src={post.image} alt="配图" className="w-full h-auto object-cover max-h-80" />
                                                    </div>
                                                )}

                                                {/* 🌟 PDF在线预览渲染 🌟 */}
                                                {post.pdf && (
                                                    <div className="mb-4 rounded-xl overflow-hidden border border-slate-200">
                                                        <div className="bg-slate-50 px-4 py-2 text-sm font-bold text-slate-700 border-b border-slate-200 flex justify-between items-center">
                                                            <span className="flex items-center gap-2">📄 附件: {post.pdf.name}</span>
                                                            <a href={post.pdf.data} download={post.pdf.name} className="text-blue-600 hover:text-blue-800 text-xs font-normal underline">点击下载源文件</a>
                                                        </div>
                                                        <iframe src={post.pdf.data} className="pdf-preview-container" title="PDF Preview">
                                                            <p>您的浏览器不支持内嵌PDF预览，请点击上方按钮下载查看。</p>
                                                        </iframe>
                                                    </div>
                                                )}

                                                <div className="pt-4 border-t border-slate-50 flex gap-6">
                                                    <button onClick={() => handleLike(post.id)} className="text-slate-500 text-sm flex items-center gap-2 hover:text-blue-600 font-semibold">
                                                        👍 赞同 {post.likes || 0}
                                                    </button>
                                                    <button onClick={() => setActiveCommentPostId(activeCommentPostId === post.id ? null : post.id)} className="text-slate-500 text-sm flex items-center gap-2 hover:text-blue-600 font-semibold">
                                                        💬 评论 {(post.comments && post.comments.length) || 0}
                                                    </button>
                                                </div>

                                                {/* 评论展示与输入区 */}
                                                {post.comments && post.comments.length > 0 && (
                                                    <div className="comment-section space-y-3 mt-4">
                                                        {post.comments.map(c => (
                                                            <div key={c.id} className="text-sm">
                                                                <span className="font-bold text-slate-700 mr-2">{c.author}:</span>
                                                                <span className="text-slate-600">{c.text}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                {activeCommentPostId === post.id && (
                                                    <div className="mt-4 flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                        <input placeholder="你的昵称 (选填)" value={commentAuthor} onChange={e => setCommentAuthor(e.target.value)} className="text-xs p-2 rounded-lg border border-slate-200 outline-none w-1/3 min-w-[120px]" />
                                                        <div className="flex gap-2">
                                                            <input placeholder="写下你的想法..." value={commentText} onChange={e => setCommentText(e.target.value)} onKeyDown={e => e.key === 'Enter' && submitComment(post.id)} className="flex-grow text-sm p-2 rounded-lg border border-slate-200 outline-none focus:border-blue-400" />
                                                            <button onClick={() => submitComment(post.id)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">发送</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 发帖弹窗 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm fade-in">
                            <div className="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-xl font-extrabold text-slate-800">发布新动态</h2>
                                    <button onClick={() => {setIsModalOpen(false); setUploadedImg(null); setUploadedPdf(null);}} className="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handlePost} className="p-6 space-y-5">
                                    <input name="title" required placeholder="加上吸引人的标题..." className="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select name="major" className="p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white outline-none text-sm text-slate-600">
                                            <option value="safety">🛡️ 安全工程</option>
                                            <option value="mining">⛏️ 采矿工程</option>
                                            <option value="underground">🚇 城市地下空间工程</option>
                                        </select>
                                        <input name="author" placeholder="你的花名 / 年级" className="p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white outline-none text-sm" />
                                    </div>
                                    <textarea name="content" required rows="4" placeholder="分享面经、避坑指南，或在这里备注附件说明..." className="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm custom-scrollbar resize-none" />
                                    
                                    {/* 🌟 附件上传选项区 🌟 */}
                                    <div className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                        <div className="text-xs font-bold text-slate-500 mb-3">附加文件 (仅支持二选一)</div>
                                        <div className="flex gap-4">
                                            <label className={`flex-1 flex flex-col items-center justify-center p-4 rounded-lg border-2 border-dashed transition-colors cursor-pointer ${uploadedImg ? 'border-blue-500 bg-blue-50' : 'border-slate-300 hover:bg-white'} ${uploadedPdf ? 'opacity-50 pointer-events-none' : ''}`}>
                                                <span className="text-xl mb-1">📸</span>
                                                <span className="text-sm font-semibold text-slate-700">上传图片</span>
                                                {uploadedImg && <span className="text-xs text-blue-600 mt-1">已选择图片</span>}
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => handleFileUpload(e, 'image')} />
                                            </label>
                                            
                                            <label className={`flex-1 flex flex-col items-center justify-center p-4 rounded-lg border-2 border-dashed transition-colors cursor-pointer ${uploadedPdf ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 hover:bg-white'} ${uploadedImg ? 'opacity-50 pointer-events-none' : ''}`}>
                                                <span className="text-xl mb-1">📄</span>
                                                <span className="text-sm font-semibold text-slate-700">上传PDF文件</span>
                                                <span className="text-[10px] text-slate-400 mt-1 text-center">支持简历、面经预览<br/>(限800KB内)</span>
                                                {uploadedPdf && <span className="text-xs text-indigo-600 mt-1 font-bold">已就绪: {uploadedPdf.name.substring(0,10)}...</span>}
                                                <input type="file" accept="application/pdf" className="hidden" onChange={(e) => handleFileUpload(e, 'pdf')} />
                                            </label>
                                        </div>
                                        {(uploadedImg || uploadedPdf) && (
                                            <div className="text-center mt-3">
                                                <button type="button" onClick={() => {setUploadedImg(null); setUploadedPdf(null);}} className="text-xs text-red-500 hover:underline">取消附件</button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="pt-2">
                                        <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white shadow-lg">🚀 发送至广场</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
