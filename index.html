<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSU资安院 | 实习互助全景平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --line: #e2e8f0;
            --brand: #2563eb;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background:
                radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 35%),
                radial-gradient(circle at 90% 0%, #e0e7ff 0%, transparent 30%),
                var(--bg);
            color: var(--text);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }

        .tab-active {
            border-bottom: 3px solid var(--brand);
            color: var(--brand);
            font-weight: 700;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .hover-card { transition: all .25s ease; }
        .hover-card:hover { transform: translateY(-4px); box-shadow: 0 14px 35px -18px rgba(2, 6, 23, .45); }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pdf-preview-container {
            width: 100%;
            height: 380px;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .hero-card {
            background: linear-gradient(135deg, #1d4ed8, #4338ca 55%, #312e81);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px -35px rgba(37, 99, 235, 0.85);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const renderContentWithLinks = (text) => {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = text.split(urlRegex);
            return parts.map((part, i) => {
                if (part.match(urlRegex)) {
                    return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline font-bold break-all">{part}</a>;
                }
                return part;
            });
        };

        const ENCYCLOPEDIA = [
            { id: 'majors', title: '三大专业全景解析', icon: '🎓', isSpecial: true, content: [
                { title: "🛡️ 安全工程", tags: ["EHS管理", "ISO体系", "风险评估"], desc: "核心是把事故预防体系化，企业更看重‘能落地’的人。", points: "优先熟悉ISO14001/45001、双重预防机制、隐患排查闭环。", roadmap: ["大二：法规+案例库", "大三：体系与现场实训", "大四：实习+项目复盘"] },
                { title: "⛏️ 采矿工程", tags: ["智能矿山", "三维建模", "自动化调度"], desc: "传统矿业正在数字化，软件与现场能力同样重要。", points: "掌握CAD/Dimine、通风爆破流程、基础地压与安全监测。", roadmap: ["打底：工程制图", "进阶：矿山软件", "冲刺：智能矿山项目"] },
                { title: "🚇 城地空间工程", tags: ["盾构施工", "BIM技术", "监测预警"], desc: "地铁、地下综合管廊、隧道工程需求持续释放。", points: "强化施工工法+监测数据理解，结合BIM协同能力。", roadmap: ["认识工法", "学会监测", "项目协同交付"] }
            ] },
            { id: 'pitfalls', title: '实习与投递避雷指南', icon: '🚨', sections: [{ h: '五大高频雷区', list: [
                '❌ 没有行业方向，盲目海投。先锁定行业再定岗位。',
                '❌ 简历堆课程不讲成果。至少写出1-2个可量化项目结果。',
                '❌ 面试前不做企业调研。提前准备企业近3年事故/处罚案例。',
                '❌ 忽略法规与预案。安全法条款、应急流程必须会说。',
                '❌ 只等网申不主动内推。积极联系学长、老师、实习带教。'
            ] }] },
            { id: 'interview', title: '简历与面试通关秘籍', icon: '💬', sections: [{ h: '高分表达模板（STAR）', list: [
                '把“我做了什么”改为“我解决了什么问题，带来什么结果”。',
                '示例：完成储罐区HAZOP分析，识别2项高风险点并推动整改。',
                '把工具具体化：AutoCAD、Excel透视表、Python数据清洗、PowerBI可视化。',
                '准备3个可迁移能力案例：沟通协同、复盘改进、现场执行。'
            ] }] },
            { id: 'career', title: '就业方向与成长路径', icon: '🧭', sections: [{ h: '八大方向（精选）', list: [
                '🏭 制造业EHS工程师：体系建设、审核迎检、隐患治理。',
                '🏗️ 建设/施工安全岗：方案审查、现场风险控制、分包协同。',
                '⛰️ 矿业与地下工程：安全监测、工艺优化、应急管理。',
                '🔋 新能源安全：锂电安全、储能评估、消防联动策略。',
                '📈 安全咨询：评价报告、合规审查、管理咨询。'
            ] }] },
            { id: 'girls', title: '女生专项就业建议', icon: '👩‍🎓', sections: [{ h: '优势岗位与策略', list: [
                '🌟 EHS体系管理：跨部门沟通强、流程推进细致。',
                '📊 安全咨询与培训：逻辑表达+文档能力优势明显。',
                '💻 智慧安全/ESG：数据分析、报告体系、数字化运营。',
                '🎯 建议：尽量争取“平台型企业+导师带教机制”的岗位。'
            ] }] },
            { id: 'plan', title: '90天冲刺计划', icon: '📅', sections: [{ h: '从0到Offer的周计划', list: [
                '第1-2周：行业与岗位定位，完成简历v1+求职看板。',
                '第3-6周：每周2次模拟面试，沉淀“项目故事库”。',
                '第7-10周：集中投递+内推跟进，A/B版本简历测试。',
                '第11-12周：复盘拒信、优化表达，争取最终转化。'
            ] }] }
        ];

        const RESOURCE_CARDS = [
            { title: '简历自检清单', icon: '🧾', desc: '30秒检查“岗位匹配度、量化结果、关键词”是否完整。' },
            { title: '面试题词库', icon: '🎤', desc: '覆盖行为面、专业面、压力面，附标准答题结构。' },
            { title: '行业案例库', icon: '📚', desc: '收录制造、矿业、施工、新能源的典型事故案例。' }
        ];

        const App = () => {
            const [view, setView] = useState('guide');
            const [activeArticle, setActiveArticle] = useState('majors');
            const [guideQuery, setGuideQuery] = useState('');
            const [postQuery, setPostQuery] = useState('');
            const [posts, setPosts] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [uploadedImg, setUploadedImg] = useState(null);
            const [uploadedPdf, setUploadedPdf] = useState(null);
            const [activeCommentPostId, setActiveCommentPostId] = useState(null);
            const [commentText, setCommentText] = useState('');
            const [commentAuthor, setCommentAuthor] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);

            const supabaseUrl = 'https://lxlulmesfgwttwbfdvbz.supabase.co';
            const supabaseKey = 'sb_publishable_MY2XdBRVo8Lo-1cq-7OgAA_JXaPAlQ8';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            useEffect(() => { fetchPosts(); }, []);

            const fetchPosts = async () => {
                const { data } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
                if (data) setPosts(data);
            };

            const handleAdminLogin = () => {
                const pwd = prompt("🕵️ 管理员验证，请输入密码：");
                if (pwd === "csu888") { setIsAdmin(true); alert("✅ 管理员模式已开启！"); }
                else if (pwd !== null) { alert("❌ 密码错误"); }
            };

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;

                if (type === 'image') {
                    if(file.size > 5 * 1024 * 1024) return alert('图片不能超过5MB哦！');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 900;
                            let width = img.width, height = img.height;
                            if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            setUploadedImg(canvas.toDataURL('image/jpeg', 0.64));
                            setUploadedPdf(null);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else if (type === 'pdf') {
                    if(file.size > 800 * 1024) return alert('PDF限800KB以内！');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setUploadedPdf({ name: file.name, data: event.target.result });
                        setUploadedImg(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePost = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                try {
                    const { error } = await supabase.from('posts').insert([{
                        title: formData.get('title'),
                        major: formData.get('major'),
                        author: formData.get('author') || '匿名同学',
                        content: formData.get('content'),
                        image: uploadedImg,
                        pdf: uploadedPdf,
                        likes: 0,
                        comments: []
                    }]);
                    if (error) throw error;
                    setIsModalOpen(false);
                    setUploadedImg(null);
                    setUploadedPdf(null);
                    fetchPosts();
                } catch {
                    alert("发帖失败，请检查网络或附件大小");
                }
            };

            const handleLike = async (id) => {
                const post = posts.find(p => p.id === id);
                if (!post) return;
                await supabase.from('posts').update({ likes: (post.likes || 0) + 1 }).eq('id', id);
                fetchPosts();
            };

            const submitComment = async (postId) => {
                if(!commentText.trim()) return;
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const newComment = { id: Date.now().toString(), author: commentAuthor || '热心同学', text: commentText };
                const updatedComments = [...(post.comments || []), newComment];
                await supabase.from('posts').update({ comments: updatedComments }).eq('id', postId);
                setCommentText('');
                setCommentAuthor('');
                setActiveCommentPostId(null);
                fetchPosts();
            };

            const handleDelete = async (id) => {
                if (confirm("⚠️ 确定要永久删除这条帖子吗？")) {
                    await supabase.from('posts').delete().eq('id', id);
                    fetchPosts();
                }
            };

            const filteredArticles = ENCYCLOPEDIA.filter(item =>
                item.title.toLowerCase().includes(guideQuery.toLowerCase())
                || (item.sections && item.sections.some(sec => sec.h.includes(guideQuery) || sec.list.join('').includes(guideQuery)))
            );

            const filteredPosts = posts.filter(post =>
                !postQuery || [post.title, post.content, post.author, post.major].join(' ').toLowerCase().includes(postQuery.toLowerCase())
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass-nav sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onDoubleClick={handleAdminLogin}>
                                <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-md ${isAdmin ? 'bg-red-600' : 'bg-gradient-to-r from-blue-600 to-indigo-600'}`}>{isAdmin ? '管' : '安'}</div>
                                <div>
                                    <h1 className="text-lg font-extrabold tracking-wide text-slate-800">资安实习全景平台</h1>
                                    <p className="text-[11px] text-slate-500 -mt-0.5">CSU Internship Hub</p>
                                </div>
                            </div>
                            <nav className="flex gap-2 sm:gap-6">
                                <button onClick={() => setView('guide')} className={`text-sm font-semibold h-16 px-2 ${view === 'guide' ? 'tab-active' : 'text-slate-500 hover:text-blue-600'}`}>百科指南</button>
                                <button onClick={() => setView('community')} className={`text-sm font-semibold h-16 px-2 ${view === 'community' ? 'tab-active' : 'text-slate-500 hover:text-blue-600'}`}>社区广场</button>
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
                        {view === 'guide' ? (
                            <div className="fade-in space-y-6">
                                <section className="hero-card rounded-3xl p-6 md:p-8 text-white">
                                    <div className="grid md:grid-cols-3 gap-4 items-center">
                                        <div className="md:col-span-2">
                                            <h2 className="text-2xl md:text-3xl font-extrabold leading-tight">一站式补齐实习信息差，<br/>从“迷茫”到“有准备”。</h2>
                                            <p className="text-blue-100 mt-3 text-sm md:text-base">整合专业路径、面试模板、岗位地图与90天行动计划，帮助你更快拿到心仪Offer。</p>
                                        </div>
                                        <div className="grid grid-cols-3 gap-3 text-center">
                                            <div className="bg-white/10 rounded-xl py-3"><p className="text-xl font-bold">6+</p><p className="text-xs text-blue-100">指南主题</p></div>
                                            <div className="bg-white/10 rounded-xl py-3"><p className="text-xl font-bold">90天</p><p className="text-xs text-blue-100">冲刺计划</p></div>
                                            <div className="bg-white/10 rounded-xl py-3"><p className="text-xl font-bold">24h</p><p className="text-xs text-blue-100">互助答疑</p></div>
                                        </div>
                                    </div>
                                </section>

                                <section className="grid md:grid-cols-3 gap-4">
                                    {RESOURCE_CARDS.map(card => (
                                        <div key={card.title} className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 hover-card">
                                            <div className="text-2xl mb-2">{card.icon}</div>
                                            <h3 className="font-bold text-slate-800">{card.title}</h3>
                                            <p className="text-sm text-slate-500 mt-1 leading-relaxed">{card.desc}</p>
                                        </div>
                                    ))}
                                </section>

                                <div className="grid md:grid-cols-4 gap-8">
                                    <div className="md:col-span-1 space-y-3">
                                        <input value={guideQuery} onChange={e => setGuideQuery(e.target.value)} placeholder="🔎 搜索知识点..." className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-400" />
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">核心知识库</h3>
                                        {(filteredArticles.length === 0 ? ENCYCLOPEDIA : filteredArticles).map(item => (
                                            <button key={item.id} onClick={() => setActiveArticle(item.id)} className={`w-full text-left px-4 py-3 rounded-xl transition-all flex items-center gap-3 ${activeArticle === item.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 bg-white border border-slate-100 hover:bg-slate-50'}`}>
                                                <span className="text-lg">{item.icon}</span><span className="font-semibold text-sm">{item.title}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="md:col-span-3">
                                        {ENCYCLOPEDIA.filter(item => item.id === activeArticle).map(article => (
                                            <div key={article.id} className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 fade-in min-h-[480px]">
                                                <h2 className="text-2xl md:text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 border-b pb-4"><span>{article.icon}</span>{article.title}</h2>
                                                {article.isSpecial ? (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                                        {article.content.map((major, i) => (
                                                            <div key={i} className="bg-slate-50 rounded-2xl p-5 border border-slate-100 hover:shadow-md transition-shadow">
                                                                <h3 className="font-bold text-lg text-slate-800 mb-2">{major.title}</h3>
                                                                <div className="flex flex-wrap gap-1 mb-4">{major.tags.map(t => <span key={t} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded">{t}</span>)}</div>
                                                                <p className="text-sm text-slate-600 mb-3">{major.desc}</p>
                                                                <div className="bg-white p-3 rounded-xl text-xs text-slate-500 border border-slate-200 mb-3"><strong>核心指引：</strong>{major.points}</div>
                                                                <div className="space-y-1.5">{major.roadmap.map(step => <p key={step} className="text-xs text-slate-500">✅ {step}</p>)}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div className="space-y-8">
                                                        {article.sections.map((sec, idx) => (
                                                            <div key={idx}>
                                                                <h3 className="text-lg font-bold text-blue-700 mb-4 border-l-4 border-blue-600 pl-3">{sec.h}</h3>
                                                                <ul className="space-y-3 text-slate-600">{sec.list.map((li, i) => <li key={i} className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><span className="leading-relaxed text-sm">{li}</span></li>)}</ul>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="fade-in grid lg:grid-cols-3 gap-6 items-start">
                                <div className="lg:col-span-2">
                                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
                                        <div>
                                            <h2 className="text-2xl font-extrabold text-slate-800">互助广场 {isAdmin && <span className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded ml-2">管理员</span>}</h2>
                                            <p className="text-sm text-slate-500 mt-1">经验分享 / 资源互换 / 面试答疑</p>
                                        </div>
                                        <button onClick={() => setIsModalOpen(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-blue-200 transition-transform transform hover:-translate-y-1">📸 发布干货帖子</button>
                                    </div>

                                    <input value={postQuery} onChange={e => setPostQuery(e.target.value)} placeholder="🔎 搜索帖子标题、作者或内容..." className="w-full mb-5 px-4 py-3 rounded-xl border border-slate-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-400" />

                                    <div className="space-y-6">
                                        {filteredPosts.length === 0 ? <div className="text-center bg-white rounded-2xl border border-slate-100 py-16 text-slate-400">暂无匹配内容，换个关键词试试～</div> :
                                        filteredPosts.map(post => (
                                            <div key={post.id} className="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 hover-card relative">
                                                {isAdmin && <button onClick={() => handleDelete(post.id)} className="absolute top-6 right-6 text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 px-3 py-1 rounded-lg text-sm font-bold transition">🗑️ 删帖</button>}
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 font-bold text-lg">{post.author?.charAt(0) || '匿'}</div>
                                                    <div>
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <span className="font-bold text-slate-800">{post.author}</span>
                                                            <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold">{post.major === 'safety' ? '安全工程' : post.major === 'mining' ? '采矿工程' : post.major === 'underground' ? '城市地下空间工程' : post.major}</span>
                                                        </div>
                                                        <span className="text-xs text-slate-400">{post.created_at ? new Date(post.created_at).toLocaleString() : '刚刚'}</span>
                                                    </div>
                                                </div>

                                                <h4 className="font-bold text-lg text-slate-900 mb-3">{post.title}</h4>
                                                <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap mb-4">{renderContentWithLinks(post.content)}</p>

                                                {post.image && <div className="mb-4 rounded-xl overflow-hidden border border-slate-100 max-w-lg"><img src={post.image} alt="配图" className="w-full h-auto object-cover max-h-80" /></div>}
                                                {post.pdf && (
                                                    <div className="mb-4 rounded-xl overflow-hidden border border-slate-200">
                                                        <div className="bg-slate-50 px-4 py-2 text-sm font-bold text-slate-700 border-b border-slate-200 flex justify-between items-center">
                                                            <span className="flex items-center gap-2">📄 附件: {post.pdf.name}</span>
                                                            <a href={post.pdf.data} download={post.pdf.name} className="text-blue-600 hover:text-blue-800 text-xs font-normal underline">点击下载源文件</a>
                                                        </div>
                                                        <iframe src={post.pdf.data} className="pdf-preview-container"></iframe>
                                                    </div>
                                                )}

                                                <div className="pt-4 border-t border-slate-50 flex gap-6">
                                                    <button onClick={() => handleLike(post.id)} className="text-slate-500 text-sm flex items-center gap-2 hover:text-blue-600 font-semibold">👍 赞同 {post.likes || 0}</button>
                                                    <button onClick={() => setActiveCommentPostId(activeCommentPostId === post.id ? null : post.id)} className="text-slate-500 text-sm flex items-center gap-2 hover:text-blue-600 font-semibold">💬 评论 {(post.comments && post.comments.length) || 0}</button>
                                                </div>

                                                {post.comments && post.comments.length > 0 && (
                                                    <div className="space-y-3 mt-4 bg-slate-50 rounded-xl border border-slate-100 p-3">
                                                        {post.comments.map(c => <div key={c.id} className="text-sm"><span className="font-bold text-slate-700 mr-2">{c.author}:</span><span className="text-slate-600">{c.text}</span></div>)}
                                                    </div>
                                                )}

                                                {activeCommentPostId === post.id && (
                                                    <div className="mt-4 flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                        <input placeholder="你的昵称 (选填)" value={commentAuthor} onChange={e => setCommentAuthor(e.target.value)} className="text-xs p-2 rounded-lg border border-slate-200 outline-none w-1/3 min-w-[120px]" />
                                                        <div className="flex gap-2">
                                                            <input placeholder="写下你的想法..." value={commentText} onChange={e => setCommentText(e.target.value)} onKeyDown={e => e.key === 'Enter' && submitComment(post.id)} className="flex-grow text-sm p-2 rounded-lg border border-slate-200 outline-none focus:border-blue-400" />
                                                            <button onClick={() => submitComment(post.id)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">发送</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <aside className="space-y-4 lg:sticky lg:top-24">
                                    <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                                        <h3 className="font-bold text-slate-800 mb-3">🔥 本周热点</h3>
                                        <ul className="space-y-2 text-sm text-slate-600">
                                            <li># 新能源EHS实习投递节奏</li>
                                            <li># 盾构监测岗位面试题</li>
                                            <li># 安全工程简历项目化表达</li>
                                        </ul>
                                    </div>
                                    <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                                        <h3 className="font-bold text-slate-800 mb-3">✍️ 发帖建议模板</h3>
                                        <p className="text-xs text-slate-500 leading-relaxed">建议结构：背景（什么岗位）→过程（做了什么）→结果（拿到什么反馈）→建议（后人如何避坑）。</p>
                                    </div>
                                </aside>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm fade-in">
                            <div className="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-xl font-extrabold text-slate-800">发布新动态</h2>
                                    <button onClick={() => {setIsModalOpen(false); setUploadedImg(null); setUploadedPdf(null);}} className="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handlePost} className="p-6 space-y-5">
                                    <input name="title" required placeholder="加上吸引人的标题..." className="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select name="major" className="p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white outline-none text-sm text-slate-600">
                                            <option value="safety">🛡️ 安全工程</option>
                                            <option value="mining">⛏️ 采矿工程</option>
                                            <option value="underground">🚇 城市地下空间工程</option>
                                        </select>
                                        <input name="author" placeholder="你的花名 / 年级" className="p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white outline-none text-sm" />
                                    </div>
                                    <textarea name="content" required rows="4" placeholder="分享面经、避坑指南，直接输入链接如 https://... 会自动变蓝跳转" className="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm custom-scrollbar resize-none" />

                                    <div className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                        <div className="text-xs font-bold text-slate-500 mb-3">附加文件 (仅支持二选一)</div>
                                        <div className="flex gap-4">
                                            <label className={`flex-1 flex flex-col items-center justify-center p-4 rounded-lg border-2 border-dashed transition-colors cursor-pointer ${uploadedImg ? 'border-blue-500 bg-blue-50' : 'border-slate-300 hover:bg-white'} ${uploadedPdf ? 'opacity-50 pointer-events-none' : ''}`}>
                                                <span className="text-xl mb-1">📸</span>
                                                <span className="text-sm font-semibold text-slate-700">上传图片</span>
                                                {uploadedImg && <span className="text-xs text-blue-600 mt-1">已选择图片</span>}
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => handleFileUpload(e, 'image')} />
                                            </label>

                                            <label className={`flex-1 flex flex-col items-center justify-center p-4 rounded-lg border-2 border-dashed transition-colors cursor-pointer ${uploadedPdf ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 hover:bg-white'} ${uploadedImg ? 'opacity-50 pointer-events-none' : ''}`}>
                                                <span className="text-xl mb-1">📄</span>
                                                <span className="text-sm font-semibold text-slate-700">上传PDF文件</span>
                                                <span className="text-[10px] text-slate-400 mt-1 text-center">支持简历、面经预览<br/>(限800KB内)</span>
                                                {uploadedPdf && <span className="text-xs text-indigo-600 mt-1 font-bold">已就绪</span>}
                                                <input type="file" accept="application/pdf" className="hidden" onChange={(e) => handleFileUpload(e, 'pdf')} />
                                            </label>
                                        </div>
                                        {(uploadedImg || uploadedPdf) && (
                                            <div className="text-center mt-3">
                                                <button type="button" onClick={() => {setUploadedImg(null); setUploadedPdf(null);}} className="text-xs text-red-500 hover:underline">取消附件</button>
                                            </div>
                                        )}
                                    </div>

                                    <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white shadow-lg">🚀 发送至广场</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
