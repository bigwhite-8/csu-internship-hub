<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSU资安院 | 实习互助全景平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/linkifyjs@4.1.1/dist/linkify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/linkify-react@4.1.1/dist/linkify-react.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hover-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .img-preview { max-height: 200px; object-fit: cover; border-radius: 0.5rem; border: 1px solid #e2e8f0; }
        .pdf-preview-container { width: 100%; height: 400px; border-radius: 0.5rem; overflow: hidden; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 🌟 修正：只保留一份解构声明
        const { useState, useEffect, useRef } = React;
        
        // 🌟 修正：更稳健的链接识别组件声明
        const Linkify = (props) => {
            const Lib = window.LinkifyReact || window['linkify-react'];
            if (!Lib) return <span>{props.children}</span>; 
            return <Lib {...props}>{props.children}</Lib>;
        };

        // --- 知识库数据 ---
        const ENCYCLOPEDIA = [
            { id: 'majors', title: '三大专业全景解析', icon: '🎓', isSpecial: true, content: [{ title: "🛡️ 安全工程 (Safety Engineering)", tags: ["EHS管理", "ISO体系", "风险评估"], desc: "不仅仅是排查隐患，更是构建企业防御体系。女生极具优势，沟通力强、细心负责。", points: "掌握ISO14001/45001体系运作，熟悉环评职评。避开传统高危行业，优先新能源、汽车制造、电子半导体等。" },{ title: "⛏️ 采矿工程 (Mining Engineering)", tags: ["智能矿山", "三维建模", "自动化调度"], desc: "传统采矿正向机械化、智能化迈进。熟练掌握CAD及Dimine等软件是核心。", points: "深入了解凿岩、爆破、通风等工艺流程。优先考虑大型国企或国际化矿业公司。可向微震监测等前沿技术深造。" },{ title: "🚇 城市地下空间工程 (Underground Space Eng.)", tags: ["盾构施工", "BIM技术", "基坑监测"], desc: "随着城市化进程，地铁、地下管廊蓬勃发展。高度依托大型工程项目现场。", points: "实地观察盾构法、明挖基坑施工。BIM技术在地下管线综合中不可或缺。积累现场经验后向技术负责人转型。" }] },
            { id: 'pitfalls', title: '实习与投递避雷指南', icon: '🚨', sections: [{ h: '五大致命雷区', list: ['❌ 行业方向不明确，盲目海投：石化重HAZOP工艺安全，建筑重脚手架高空作业。','❌ 简历堆砌课程，忽视实操：企业宁要查过宿舍消防的，也不要只会背书的。要把课程设计包装成项目。','❌ 没提前准备行业知识：面试前必须搜行业典型事故案例，准备特有解决方案。','❌ 忽略安全岗特殊要求：必学三大法宝：法规(安法第25条)、预案编制流程、风险评估方法(LEC/HAZOP)。','❌ 死等网申，不敢争取内推：坑位少，盯紧校企合作、政府暑期计划及行业社群。']}] },
            { id: 'interview', title: '简历与面试通关秘籍', icon: '💬', sections: [{ h: '简历高分写法 (STAR法则)', list: ['情境+任务+行动+结果。例：“负责储罐区HAZOP分析，发现2处静电隐患并建议增设联锁装置，减少整改成本5W+”。','加入数据加分：例如“巡检记录让部门隐患整改率从60%提升至85%”。','突出工具技能：AutoCAD画疏散图、气体检测仪使用、Python数据分析。']}] },
            { id: 'career', title: '八大就业方向全景图', icon: '🧭', sections: [{ h: '核心就业方向', list: ['🏭 工厂制造业：安全工程师、EHS工程师（建体系）。','🏗️ 建筑与施工：施工安全员、安全监理、BIM安全工程师。','⛰️ 矿业及地下工程：矿山安全工程师、爆破安全工程师。','🔋 新能源（风口）：锂电池防火防爆设计、储能安全评估。']}] },
            { id: 'girls', title: '女生专属就业指南', icon: '👩‍🎓', sections: [{ h: '避开偏见，精准拿Offer', list: ['🌟 企业EHS管理（主场）：外企/大厂/新能源超爱招！主攻体系专员、职业健康管理师。','📊 安全咨询/服务（脑力派）：逻辑清晰文笔好，做安全评价师、EHS咨询顾问。','💻 新兴蓝海赛道：智慧安全工程师、ESG专员、互联网安全培训师。']}] }
        ];

        const App = () => {
            const [view, setView] = useState('guide'); 
            const [activeArticle, setActiveArticle] = useState('majors'); 
            const [posts, setPosts] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [uploadedImg, setUploadedImg] = useState(null);
            const [uploadedPdf, setUploadedPdf] = useState(null);
            const [activeCommentPostId, setActiveCommentPostId] = useState(null);
            const [commentText, setCommentText] = useState('');
            const [commentAuthor, setCommentAuthor] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);

            const supabaseUrl = 'https://lxlulmesfgwttwbfdvbz.supabase.co';
            const supabaseKey = 'sb_publishable_MY2XdBRVo8Lo-1cq-7OgAA_JXaPAlQ8';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            useEffect(() => { fetchPosts(); }, []);

            const fetchPosts = async () => {
                const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
                if (data) setPosts(data);
            };

            const handleAdminLogin = () => {
                const pwd = prompt("🕵️ 管理员验证，请输入密码：");
                if (pwd === "csu888") { setIsAdmin(true); alert("✅ 管理员模式已开启！"); } 
                else if (pwd !== null) { alert("❌ 密码错误"); }
            };

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                if (type === 'image') {
                    if(file.size > 5 * 1024 * 1024) return alert('图片不能超过5MB哦！');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width, height = img.height;
                            if (width > 800) { height = Math.round((height * 800) / width); width = 800; }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            setUploadedImg(canvas.toDataURL('image/jpeg', 0.6));
                            setUploadedPdf(null);
                        }
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else if (type === 'pdf') {
                    if(file.size > 800 * 1024) return alert('PDF限800KB以内！');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setUploadedPdf({ name: file.name, data: event.target.result });
                        setUploadedImg(null); 
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePost = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                try {
                    const { error } = await supabase.from('posts').insert([{
                        title: formData.get('title'), major: formData.get('major'),
                        author: formData.get('author') || '匿名同学', content: formData.get('content'),
                        image: uploadedImg, pdf: uploadedPdf, likes: 0, comments: []
                    }]);
                    if (error) throw error;
                    setIsModalOpen(false); setUploadedImg(null); setUploadedPdf(null); fetchPosts();
                } catch (error) { alert("发帖失败，请检查附件大小"); }
            };

            const handleLike = async (id) => {
                const post = posts.find(p => p.id === id);
                await supabase.from('posts').update({ likes: (post.likes || 0) + 1 }).eq('id', id);
                fetchPosts();
            };

            const submitComment = async (postId) => {
                if(!commentText.trim()) return;
                const post = posts.find(p => p.id === postId);
                const newComment = { id: Date.now().toString(), author: commentAuthor || '热心同学', text: commentText };
                const updatedComments = [...(post.comments || []), newComment];
                await supabase.from('posts').update({ comments: updatedComments }).eq('id', postId);
                setCommentText(''); setActiveCommentPostId(null); fetchPosts();
            };

            const handleDelete = async (id) => {
                if (confirm("⚠️ 确定要永久删除这条帖子吗？")) {
                    await supabase.from('posts').delete().eq('id', id);
                    fetchPosts();
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass-nav sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onDoubleClick={handleAdminLogin}>
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-md ${isAdmin ? 'bg-red-600' : 'bg-gradient-to-r from-blue-600 to-indigo-600'}`}>{isAdmin ? '管' : '安'}</div>
                                <h1 className="text-lg font-bold text-slate-800">资安实习全景平台</h1>
                            </div>
                            <nav className="flex gap-2 sm:gap-6">
                                <button onClick={() => setView('guide')} className={`text-sm font-semibold h-16 px-2 ${view === 'guide' ? 'tab-active' : 'text-slate-500 hover:text-blue-600'}`}>百科指南</button>
                                <button onClick={() => setView('community')} className={`text-sm font-semibold h-16 px-2 ${view === 'community' ? 'tab-active' : 'text-slate-500 hover:text-blue-600'}`}>社区广场</button>
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
                        {view === 'guide' ? (
                            <div className="fade-in grid md:grid-cols-4 gap-8">
                                <div className="md:col-span-1 space-y-2">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase px-4 mb-4">核心知识库</h3>
                                    {ENCYCLOPEDIA.map(item => (
                                        <button key={item.id} onClick={() => setActiveArticle(item.id)} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 ${activeArticle === item.id ? 'bg-blue-600 text-white' : 'hover:bg-slate-100'}`}>
                                            <span>{item.icon}</span> <span className="font-semibold text-sm">{item.title}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="md:col-span-3">
                                    {ENCYCLOPEDIA.filter(item => item.id === activeArticle).map(article => (
                                        <div key={article.id} className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 min-h-[500px]">
                                            <h2 className="text-2xl font-extrabold mb-8 pb-6 border-b">{article.icon} {article.title}</h2>
                                            {article.isSpecial ? (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    {article.content.map((m, i) => (
                                                        <div key={i} className="bg-slate-50 rounded-2xl p-6 border border-slate-100 hover:shadow-md transition-shadow">
                                                            <h3 className="font-bold text-lg mb-2">{m.title}</h3>
                                                            <div className="flex flex-wrap gap-1 mb-4">{m.tags.map(t => <span key={t} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded">{t}</span>)}</div>
                                                            <p className="text-sm text-slate-600 mb-4">{m.desc}</p>
                                                            <div className="bg-white p-4 rounded-xl text-xs text-slate-500 border shadow-sm"><strong>指引：</strong>{m.points}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="space-y-10">
                                                    {article.sections.map((sec, idx) => (
                                                        <div key={idx}>
                                                            <h3 className="text-xl font-bold text-blue-700 mb-4 border-l-4 border-blue-600 pl-3">{sec.h}</h3>
                                                            <ul className="space-y-4 text-slate-600">{sec.list.map((li, i) => <li key={i}>• {li}</li>)}</ul>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="fade-in max-w-3xl mx-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-extrabold text-slate-800">互助广场 {isAdmin && <span className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded ml-2">管理员</span>}</h2>
                                    <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-blue-200">📸 发布干货</button>
                                </div>
                                <div className="space-y-6">
                                    {posts.length === 0 ? <div className="text-center py-20 text-slate-400">正在同步云端数据...</div> : 
                                    posts.map(post => (
                                        <div key={post.id} className="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 relative">
                                            {isAdmin && <button onClick={() => handleDelete(post.id)} className="absolute top-6 right-6 text-red-500 text-xs font-bold hover:underline">🗑️ 删帖</button>}
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold">{post.author?.charAt(0)}</div>
                                                <div>
                                                    <div className="font-bold text-slate-800 text-sm">{post.author} <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px]">{post.major}</span></div>
                                                    <span className="text-xs text-slate-400">{post.created_at ? new Date(post.created_at).toLocaleString() : '刚刚'}</span>
                                                </div>
                                            </div>
                                            <h4 className="font-bold text-lg mb-3">{post.title}</h4>
                                            <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap mb-4">
                                                <Linkify options={{className: 'text-blue-600 hover:underline font-bold', target: '_blank'}}>
                                                    {post.content}
                                                </Linkify>
                                            </p>
                                            {post.image && <img src={post.image} className="mb-4 rounded-xl max-w-full h-auto max-h-80 border" />}
                                            {post.pdf && (
                                                <div className="mb-4 rounded-xl overflow-hidden border">
                                                    <div className="bg-slate-50 px-4 py-2 text-sm font-bold flex justify-between">📄 {post.pdf.name} <a href={post.pdf.data} download={post.pdf.name} className="text-blue-600 hover:underline">下载</a></div>
                                                    <iframe src={post.pdf.data} className="pdf-preview-container"></iframe>
                                                </div>
                                            )}
                                            <div className="pt-4 border-t flex gap-6 text-sm text-slate-500 font-semibold">
                                                <button onClick={() => handleLike(post.id)} className="hover:text-blue-600">👍 赞同 {post.likes || 0}</button>
                                                <button onClick={() => setActiveCommentPostId(activeCommentPostId === post.id ? null : post.id)} className="hover:text-blue-600">💬 评论 {(post.comments || []).length}</button>
                                            </div>
                                            {(post.comments || []).length > 0 && (
                                                <div className="mt-4 space-y-2 bg-slate-50 p-4 rounded-xl text-sm">
                                                    {post.comments.map(c => <div key={c.id}><span className="font-bold">{c.author}:</span> <span className="text-slate-600">{c.text}</span></div>)}
                                                </div>
                                            )}
                                            {activeCommentPostId === post.id && (
                                                <div className="mt-4 flex gap-2">
                                                    <input placeholder="昵称" value={commentAuthor} onChange={e=>setCommentAuthor(e.target.value)} className="w-24 p-2 text-xs border rounded-lg outline-none" />
                                                    <input placeholder="写下想法..." value={commentText} onChange={e=>setCommentText(e.target.value)} className="flex-1 p-2 text-sm border rounded-lg outline-none" />
                                                    <button onClick={() => submitComment(post.id)} className="bg-blue-600 text-white px-4 rounded-lg text-sm font-bold">发送</button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm fade-in">
                            <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">发布干货</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 text-2xl">&times;</button>
                                </div>
                                <form onSubmit={handlePost} className="space-y-4">
                                    <input name="title" required placeholder="标题..." className="w-full p-3 rounded-xl bg-slate-50 border outline-none font-bold" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select name="major" className="p-3 rounded-xl bg-slate-50 border outline-none text-sm"><option>🛡️ 安全工程</option><option>⛏️ 采矿工程</option><option>🚇 地下工程</option></select>
                                        <input name="author" placeholder="你的名字" className="p-3 rounded-xl bg-slate-50 border outline-none text-sm" />
                                    </div>
                                    <textarea name="content" required rows="4" placeholder="分享内容，自动识别链接..." className="w-full p-3 rounded-xl bg-slate-50 border outline-none text-sm resize-none" />
                                    <div className="flex gap-4 p-4 border rounded-xl bg-slate-50">
                                        <label className={`flex-1 text-center cursor-pointer ${uploadedPdf ? 'opacity-30' : ''}`}><span className="block text-xl">📸</span><span className="text-xs font-bold text-gray-500">图片</span><input type="file" accept="image/*" className="hidden" onChange={e=>handleFileUpload(e,'image')}/></label>
                                        <label className={`flex-1 text-center border-l cursor-pointer ${uploadedImg ? 'opacity-30' : ''}`}><span className="block text-xl">📄</span><span className="text-xs font-bold text-gray-500">PDF</span><input type="file" accept="application/pdf" className="hidden" onChange={e=>handleFileUpload(e,'pdf')}/></label>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg">🚀 发送至广场</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
